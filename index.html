<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>婚禮邀請 · RSVP</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@300;400&family=EB+Garamond:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #fdf8f3;
      --blush:   #e8c9b8;
      --rose:    #c9896e;
      --gold:    #b8965a;
      --deep:    #4a3728;
      --muted:   #8a7060;
      --white:   #fff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--deep);
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── DECORATIVE NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 60px 24px;
      overflow: hidden;
    }

    /* petal-like decorative rings */
    .hero::before, .hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(184,150,90,.18);
      pointer-events: none;
    }
    .hero::before {
      width: 700px; height: 700px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .hero::after {
      width: 520px; height: 520px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .ring-outer {
      position: absolute;
      width: 860px; height: 860px;
      border-radius: 50%;
      border: 1px solid rgba(184,150,90,.10);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .deco-line {
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 0 auto 28px;
      animation: fadeIn 1.5s ease forwards;
    }

    .label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(12px, 2vw, 14px);
      letter-spacing: .35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 20px;
      animation: fadeUp .8s ease both;
    }

    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: .04em;
      color: var(--deep);
      animation: fadeUp .9s .15s ease both;
    }

    .names em {
      font-style: italic;
      color: var(--rose);
    }

    .ampersand {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1.2em;
      color: var(--gold);
      display: block;
      line-height: 1;
    }

    .hero-date {
      margin-top: 28px;
      font-size: clamp(13px, 2vw, 15px);
      letter-spacing: .22em;
      color: var(--muted);
      animation: fadeUp 1s .3s ease both;
    }

    .hero-venue {
      margin-top: 8px;
      font-size: clamp(12px, 1.8vw, 14px);
      letter-spacing: .15em;
      color: var(--muted);
      animation: fadeUp 1s .4s ease both;
    }

    .scroll-cue {
      position: absolute; bottom: 32px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: fadeIn 1.4s 1s ease both;
      cursor: pointer;
    }
    .scroll-cue span {
      font-size: 11px; letter-spacing: .2em; color: var(--gold);
      text-transform: uppercase;
    }
    .scroll-arrow {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: arrowPulse 2s infinite;
    }

    /* ── INFO BAND ── */
    .info-band {
      background: var(--deep);
      color: var(--cream);
      padding: 56px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .info-band::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg, rgba(184,150,90,.04) 0px, rgba(184,150,90,.04) 1px,
        transparent 1px, transparent 24px
      );
    }
    .info-grid {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 48px;
      position: relative; max-width: 860px; margin: 0 auto;
    }
    .info-item { min-width: 160px; }
    .info-item .i-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 12px; letter-spacing: .3em;
      color: var(--gold); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .info-item .i-val {
      font-size: 16px; letter-spacing: .06em; line-height: 1.6;
    }

    /* ── SECTION DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 20px;
      max-width: 480px; margin: 0 auto 48px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blush));
    }
    .divider::after { background: linear-gradient(to left, transparent, var(--blush)); }
    .divider-icon { color: var(--gold); font-size: 18px; flex-shrink: 0; }

    /* ── RSVP SECTION ── */
    .rsvp-section {
      padding: 88px 24px;
      max-width: 680px;
      margin: 0 auto;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 300;
      text-align: center;
      letter-spacing: .08em;
      margin-bottom: 8px;
      color: var(--deep);
    }
    .section-sub {
      text-align: center;
      font-size: 13px; letter-spacing: .18em; color: var(--muted);
      margin-bottom: 56px;
    }

    /* ── FORM ── */
    .field-group { margin-bottom: 32px; }
    .field-group label {
      display: block;
      font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }

    .field-group input[type="text"],
    .field-group input[type="number"],
    .field-group textarea,
    .field-group select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--blush);
      padding: 10px 0;
      font-family: 'Noto Serif TC', serif;
      font-size: 15px; font-weight: 300;
      color: var(--deep);
      outline: none;
      transition: border-color .3s;
      appearance: none;
    }
    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus {
      border-color: var(--rose);
    }
    .field-group textarea {
      resize: vertical; min-height: 80px;
    }

    /* attendance radio */
    .attend-row {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .attend-option {
      flex: 1; min-width: 120px;
    }
    .attend-option input { display: none; }
    .attend-option label {
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--blush);
      border-radius: 2px;
      padding: 14px 20px;
      cursor: pointer;
      font-size: 14px; letter-spacing: .12em;
      color: var(--muted);
      transition: all .25s;
      text-transform: none;
    }
    .attend-option input:checked + label {
      border-color: var(--rose);
      background: rgba(201,137,110,.08);
      color: var(--rose);
    }

    /* meal checkboxes */
    .meal-row {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .meal-option input { display: none; }
    .meal-option label {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--blush); border-radius: 2px;
      padding: 9px 18px;
      cursor: pointer; font-size: 14px; letter-spacing: .1em;
      color: var(--muted); transition: all .25s;
      text-transform: none;
    }
    .meal-option input:checked + label {
      border-color: var(--gold);
      background: rgba(184,150,90,.08);
      color: var(--deep);
    }

    /* accommodation toggle */
    .toggle-row { display: flex; gap: 12px; }
    .toggle-option input { display: none; }
    .toggle-option label {
      border: 1px solid var(--blush); border-radius: 2px;
      padding: 9px 22px; cursor: pointer;
      font-size: 14px; letter-spacing: .1em;
      color: var(--muted); transition: all .25s;
      text-transform: none;
    }
    .toggle-option input:checked + label {
      border-color: var(--rose);
      background: rgba(201,137,110,.08);
      color: var(--rose);
    }

    /* counter */
    .counter-row {
      display: flex; align-items: center; gap: 16px;
    }
    .counter-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--blush);
      background: transparent; cursor: pointer;
      font-size: 20px; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .counter-btn:hover { border-color: var(--rose); color: var(--rose); }
    .counter-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; min-width: 40px; text-align: center;
      color: var(--deep);
    }
    .counter-label { font-size: 13px; color: var(--muted); }

    /* submit */
    .submit-wrap { text-align: center; margin-top: 48px; }
    .submit-btn {
      display: inline-block;
      background: var(--deep);
      color: var(--cream);
      border: none; cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; letter-spacing: .28em;
      text-transform: uppercase;
      padding: 18px 56px;
      position: relative; overflow: hidden;
      transition: background .3s;
    }
    .submit-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--rose);
      transform: translateX(-100%);
      transition: transform .4s ease;
    }
    .submit-btn:hover::after { transform: translateX(0); }
    .submit-btn span { position: relative; z-index: 1; }

    /* deadline note */
    .deadline-note {
      text-align: center; margin-top: 20px;
      font-size: 12px; letter-spacing: .15em; color: var(--muted);
    }

    /* ── SUCCESS STATE ── */
    .success-msg {
      display: none;
      text-align: center; padding: 64px 24px;
    }
    .success-msg .s-icon { font-size: 48px; margin-bottom: 20px; }
    .success-msg h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300;
      margin-bottom: 12px; color: var(--deep);
    }
    .success-msg p { color: var(--muted); font-size: 14px; letter-spacing: .1em; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(184,150,90,.2);
      padding: 40px 24px;
      text-align: center;
      font-size: 12px; letter-spacing: .18em; color: var(--muted);
    }
    footer .f-names {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 20px;
      color: var(--rose); display: block; margin-bottom: 8px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: .4; transform: scaleY(1); }
      50%       { opacity: 1;  transform: scaleY(1.1); }
    }

    /* hidden dependent field */
    .dep-field { display: none; }
    .dep-field.visible { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .names { font-size: clamp(44px, 15vw, 72px); }
      .info-grid { gap: 32px; }
    }

    /* ── PHOTO SECTION ── */
    .photo-section {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 72px 24px;
      background: var(--cream);
      overflow: hidden;
    }
    .photo-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(232,201,184,.18) 0%, transparent 70%);
    }
    .photo-frame {
      position: relative;
      max-width: 540px;
      width: 100%;
    }
    .photo-frame::before {
      content: '';
      position: absolute;
      inset: -14px;
      border: 1px solid rgba(184,150,90,.3);
      pointer-events: none;
      z-index: 2;
    }
    .photo-frame::after {
      content: '';
      position: absolute;
      inset: -7px;
      border: 1px solid rgba(184,150,90,.15);
      pointer-events: none;
      z-index: 2;
    }
    .photo-frame img {
      width: 100%;
      display: block;
      filter: sepia(8%) contrast(1.04) brightness(1.01);
    }
    .photo-caption {
      text-align: center;
      margin-top: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--muted);
      letter-spacing: .12em;
    }
  </style>
</head>
<body>

<!-- ════════════════ HERO ════════════════ -->
<section class="hero" id="top">
  <div class="ring-outer"></div>
  <div class="deco-line"></div>
  <p class="label">We're getting married</p>
  <h1 class="names">
    騁玄<span class="ampersand">&amp;</span><em>鈺綺</em>
  </h1>
  <p class="hero-date">2027 年 9 月 4 日（五）</p>
  <p class="hero-venue">宜蘭山頂會館</p>

  <div class="scroll-cue" onclick="document.getElementById('info').scrollIntoView({behavior:'smooth'})">
    <span>確認出席</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- ════════════════ RSVP FORM ════════════════ -->
<section class="rsvp-section" id="rsvp">
  <h2 class="section-title">出席確認</h2>
  <p class="section-sub">請於 2027 年 1 月 1 日前填寫，感謝您 ✦</p>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <div id="rsvp-form">

    <!-- 姓名 -->
    <div class="field-group">
      <label for="name">您的姓名</label>
      <input type="text" id="name" placeholder="請輸入您的全名" />
    </div>

    <!-- 出席意願 -->
    <div class="field-group">
      <label>是否出席</label>
      <div class="attend-row">
        <div class="attend-option">
          <input type="radio" name="attend" id="yes" value="yes" onchange="toggleAttend(true)" />
          <label for="yes">🎊 &nbsp;歡喜出席</label>
        </div>
        <div class="attend-option">
          <input type="radio" name="attend" id="no" value="no" onchange="toggleAttend(false)" />
          <label for="no">🙏 &nbsp;感謝邀請，但無法出席</label>
        </div>
      </div>
    </div>

    <!-- 以下欄位只在「出席」時顯示 -->
    <div id="attend-fields">

      <!-- 出席人數 -->
      <div class="field-group">
        <label>出席人數（含您本人）</label>
        <div class="counter-row">
          <button class="counter-btn" type="button" onclick="changeCount(-1)">−</button>
          <span class="counter-display" id="count-display">1</span>
          <button class="counter-btn" type="button" onclick="changeCount(1)">+</button>
          <span class="counter-label">位</span>
        </div>
        <input type="hidden" id="guest-count" value="1" />
      </div>

      <!-- 餐點偏好 -->
      <div class="field-group">
        <label>餐點偏好（可複選）</label>
        <div class="meal-row">
          <div class="meal-option">
            <input type="checkbox" id="meat" name="meal" value="葷食" />
            <label for="meat">🍖 葷食</label>
          </div>
          <div class="meal-option">
            <input type="checkbox" id="veg" name="meal" value="素食" />
            <label for="veg">🥦 素食</label>
          </div>
          <div class="meal-option">
            <input type="checkbox" id="both" name="meal" value="葷素皆可" />
            <label for="both">✨ 葷素皆可</label>
          </div>
        </div>
      </div>

      <!-- 住宿 -->
      <div class="field-group">
        <label>是否需要住宿安排</label>
        <div class="toggle-row">
          <div class="toggle-option">
            <input type="radio" name="hotel" id="hotel-yes" value="yes" onchange="toggleHotel(true)"/>
            <label for="hotel-yes">需要</label>
          </div>
          <div class="toggle-option">
            <input type="radio" name="hotel" id="hotel-no" value="no" onchange="toggleHotel(false)"/>
            <label for="hotel-no">不需要</label>
          </div>
        </div>
      </div>

      <div class="field-group dep-field" id="hotel-detail">
        <label>住宿需求說明</label>
        <input type="text" placeholder="例：單人房 1 間，10/17 入住" />
      </div>

    </div><!-- /attend-fields -->

    <!-- 祝福留言 -->
    <div class="field-group">
      <label>給我們的祝福 <span style="opacity:.5;font-style:italic">（選填）</span></label>
      <textarea id="message" placeholder="寫下您對我們的祝福 ♡"></textarea>
    </div>

    <!-- 送出 -->
    <div class="submit-wrap">
      <button class="submit-btn" type="button" onclick="handleSubmit()">
        <span>送出回覆</span>
      </button>
      <p class="deadline-note">請於 2027 年 1 月 1 日前填寫完成</p>
    </div>

  </div><!-- /rsvp-form -->

  <!-- 成功訊息 -->
  <div class="success-msg" id="success">
    <div class="s-icon">💌</div>
    <h2>感謝您的回覆！</h2>
    <p>我們收到您的訊息了，<br>期待在婚禮當天與您相見 ✦</p>
  </div>

</section>

<!-- ════════════════ FOOTER ════════════════ -->
<footer>
  <em class="f-names">騁玄 &amp; 鈺綺</em>
  感謝您一路以來的陪伴與祝福
</footer>

<!-- ════════════════ SCRIPT ════════════════ -->
<script>
  let guestCount = 1;

  function changeCount(delta) {
    guestCount = Math.max(1, Math.min(20, guestCount + delta));
    document.getElementById('count-display').textContent = guestCount;
    document.getElementById('guest-count').value = guestCount;
  }

  function toggleAttend(attending) {
    const fields = document.getElementById('attend-fields');
    fields.style.display = attending ? 'block' : 'none';
    fields.style.animation = attending ? 'fadeUp .4s ease' : '';
  }

  function toggleHotel(need) {
    const detail = document.getElementById('hotel-detail');
    detail.classList.toggle('visible', need);
  }

  // init: hide attend-fields
  document.getElementById('attend-fields').style.display = 'none';

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyL7CO0I99tGa9f9_PjJQMrzaHKpm8eSjmrOhJr231o0PdePA75Vcxb-ceLMzdHryFzOg/exec';

  function handleSubmit() {
    const name = document.getElementById('name').value.trim();
    const attendEl = document.querySelector('input[name="attend"]:checked');

    if (!name) { alert('請輸入您的姓名 ✦'); return; }
    if (!attendEl) { alert('請選擇是否出席 ✦'); return; }

    const attend = attendEl.value;
    const guests = attend === 'yes' ? document.getElementById('guest-count').value : '';
    const meals = attend === 'yes'
      ? Array.from(document.querySelectorAll('input[name="meal"]:checked')).map(el => el.value).join('、')
      : '';
    const hotelEl = document.querySelector('input[name="hotel"]:checked');
    const hotel = hotelEl ? hotelEl.value : '';
    const hotelNote = hotel === 'yes'
      ? (document.querySelector('#hotel-detail input') || {value:''}).value.trim()
      : '';
    const message = document.getElementById('message').value.trim();

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = '送出中...';

    const payload = { name, attend, guests, meals, hotel, hotelNote, message };

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => {
      const form =const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiBB_GcS3hl_T4aXFFGGD3Pa0RTHGe57CuEmiIjiqR8o5LGWIIPT2MEYt5LFBL7Lh3tw/exec';
      form.style.transition = 'opacity .5s, transform .5s';
      form.style.opacity = '0';
      form.style.transform = 'translateY(20px)';
      setTimeout(() => {
        form.style.display = 'none';
        const success = document.getElementById('success');
        success.style.display = 'block';
        success.style.animation = 'fadeUp .6s ease';
        success.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 500);
    })
    .catch(() => {
      alert('送出失敗，請檢查網路後再試一次。');
      btn.disabled = false;
      btn.textContent = '送出回覆';
    });
  }
</script>
</body>
</html>
