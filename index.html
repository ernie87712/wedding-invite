<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>婚禮邀請 · RSVP</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@300;400&family=EB+Garamond:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf8f3; --blush: #e8c9b8; --rose: #c9896e;
      --gold: #b8965a; --deep: #4a3728; --muted: #8a7060; --white: #fff;
    }
    body {
      background: var(--cream); color: var(--deep);
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      min-height: 100vh; overflow-x: hidden; position: relative;
    }

    /* ── ✨ 動態背景裝飾 ── */
    .bg-decorations {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: -1; overflow: hidden;
    }
    .petal {
      position: absolute; background: var(--blush); opacity: 0.3;
      border-radius: 150% 0 150% 0; animation: float 15s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(-10%) rotate(0deg); left: var(--start-x); }
      100% { transform: translateY(110vh) rotate(720deg); left: var(--end-x); }
    }

    /* ── 照片與佈局 ── */
    .hero { position: relative; padding: 80px 24px; text-align: center; }
    .photo-container {
      width: 280px; height: 280px; margin: 0 auto 40px; border-radius: 50%;
      overflow: hidden; border: 8px solid var(--white);
      box-shadow: 0 15px 35px rgba(74, 55, 40, 0.1); position: relative; z-index: 2;
    }
    .photo-container img { width: 100%; height: 100%; object-fit: cover; }
    
    .names { font-family: 'Cormorant Garamond', serif; font-size: clamp(52px, 10vw, 80px); line-height: 1.1; }
    .names em { font-style: italic; color: var(--rose); display: block; }
    
    .rsvp-section { padding: 40px 24px; max-width: 600px; margin: 0 auto; }
    .rsvp-card { background: var(--white); padding: 40px; border: 1px solid rgba(184, 150, 90, 0.12); border-radius: 4px; }
    
    .field-group { margin-bottom: 30px; }
    .field-group label { display: block; font-size: 13px; color: var(--gold); margin-bottom: 10px; letter-spacing: 1px; }
    input[type="text"], textarea { width: 100%; border: none; border-bottom: 1px solid var(--blush); padding: 10px 0; font-size: 16px; outline: none; }
    
    /* 計數器 */
    .guest-counts { display: flex; gap: 30px; margin-top: 10px; }
    .counter { display: flex; align-items: center; gap: 10px; }
    .counter-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--blush); background: none; cursor: pointer; }
    .counter input { width: 30px; text-align: center; border: none; font-size: 18px; background: none; }

    .submit-btn { width: 100%; background: var(--deep); color: var(--cream); border: none; padding: 18px; letter-spacing: 2px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
    .submit-btn:hover { background: var(--rose); }

    #attend-details { display: none; padding-top: 20px; border-top: 1px solid #f0f0f0; }
    #success { display: none; text-align: center; padding: 40px 0; }
  </style>
</head>
<body>

  <div class="bg-decorations" id="bg-decor">
    <script>
      // 動態生成飄落物
      const container = document.getElementById('bg-decor');
      for (let i = 0; i < 15; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const size = Math.random() * 15 + 10 + 'px';
        petal.style.width = size;
        petal.style.height = size;
        petal.style.setProperty('--start-x', Math.random() * 100 + '%');
        petal.style.setProperty('--end-x', (Math.random() * 100 - 20) + '%');
        petal.style.animationDelay = Math.random() * 10 + 's';
        petal.style.animationDuration = (Math.random() * 10 + 10) + 's';
        container.appendChild(petal);
      }
    </script>
  </div>

    <h1 class="names">騁玄 <span style="font-family:serif; color:var(--gold);">×</span> <em>鈺綺</em></h1>
    <p style="margin-top: 20px;">2027.09.04 · 宜蘭山頂會館</p>
  </section>

  <div class="rsvp-section">
    <div class="rsvp-card">
      <form id="rsvp-form">
        <div class="field-group">
          <label>👤 您的姓名 Name</label>
          <input type="text" id="name" required placeholder="請填寫姓名">
        </div>

        <div class="field-group">
          <label>💌 出席狀況 Attendance</label>
          <div style="display:flex; gap: 20px;">
            <label style="color:var(--deep);"><input type="radio" name="attend" value="yes" onclick="toggleFields(true)" required> 💍 期待參加</label>
            <label style="color:var(--deep);"><input type="radio" name="attend" value="no" onclick="toggleFields(false)"> 🕊️ 婉拒參加</label>
          </div>
        </div>

        <div id="attend-details">
          <div class="field-group">
            <label>👥 出席人數 Number of Guests</label>
            <div class="guest-counts">
              <div class="counter">🧑 大人 <button type="button" class="counter-btn" onclick="updateCount('adults', -1)">-</button><input type="text" id="adults" value="1" readonly><button type="button" class="counter-btn" onclick="updateCount('adults', 1)">+</button></div>
              <div class="counter">👶 小孩 <button type="button" class="counter-btn" onclick="updateCount('kids', -1)">-</button><input type="text" id="kids" value="0" readonly><button type="button" class="counter-btn" onclick="updateCount('kids', 1)">+</button></div>
            </div>
          </div>

          <div class="field-group">
            <label>🍽️ 餐點選擇 Dietary</label>
            <label style="margin-right:15px;"><input type="checkbox" name="meal" value="葷食"> 🥩 葷食</label>
            <label><input type="checkbox" name="meal" value="素食"> 🥗 素食</label>
          </div>
        </div>

        <div class="field-group">
          <label>✍️ 給新人的祝福 Message</label>
          <textarea id="message" rows="3" placeholder="想對我們說的話..."></textarea>
        </div>

        <button type="submit" class="submit-btn">送出回覆 SEND RSVP</button>
      </form>
      <div id="success">
        <h2 style="color:var(--rose);">Thank You!</h2>
        <p>回覆已成功送出，期待與您相見。</p>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw647H8Pdn-v279hgidfVBBRP43D1zNCFKpwS7kvDKB_a1UD-geK2R9F2rf2-9S7Cx60g/exec';
    
    function updateCount(id, delta) {
      const el = document.getElementById(id);
      let val = parseInt(el.value) + delta;
      if (id === 'adults' && val < 1) val = 1;
      if (id === 'kids' && val < 0) val = 0;
      el.value = val;
    }

    function toggleFields(show) {
      document.getElementById('attend-details').style.display = show ? 'block' : 'none';
    }

    document.getElementById('rsvp-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.innerText = '傳送中...';

      const attend = document.querySelector('input[name="attend"]:checked').value;
      const data = {
        name: document.getElementById('name').value,
        attend: attend,
        guests: attend === 'yes' ? `${document.getElementById('adults').value}大${document.getElementById('kids').value}小` : '0',
        meals: Array.from(document.querySelectorAll('input[name="meal"]:checked')).map(m => m.value).join('、'),
        message: document.getElementById('message').value
      };

      fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
      .then(() => {
        document.getElementById('rsvp-form').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      });
    });
  </script>
